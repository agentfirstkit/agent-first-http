name: Ops & Takeover

# The ops-panel and display-takeover suites are flaky by design: ops tests spawn
# (and sometimes leak) chromium children under Docker resource pressure, and the
# takeover suite drives a real KasmVNC display. They run here on a nightly
# schedule (and on demand) in their own workflow so they never gate a merge or a
# release — `wait_for_ci_green` watches ci.yml only.

on:
  schedule:
    - cron: '17 4 * * *'   # nightly, 04:17 UTC
  workflow_dispatch:

# afhttp depends on a sibling crate at ../agent-first-data/rust via a Cargo path
# override; check out both repos in the layout the Docker harness expects.
jobs:
  ops-takeover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: kit/spores/agent-first-http
          fetch-depth: 0
      - uses: actions/checkout@v4
        with:
          repository: agentfirstkit/agent-first-data
          path: kit/spores/agent-first-data
          fetch-depth: 1
      - name: Ops-panel suite (serialized, Docker harness)
        working-directory: kit/spores/agent-first-http
        run: tests/test.sh ops
      - name: Display-takeover suite (KasmVNC, Docker harness)
        working-directory: kit/spores/agent-first-http
        run: tests/test.sh takeover
