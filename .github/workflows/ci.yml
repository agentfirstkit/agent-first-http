name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: taiki-e/install-action@cargo-llvm-cov

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Python test deps
        run: pip install websockets

      - name: Static (fmt + clippy)
        run: |
          cargo fmt --all --check
          cargo build
          cargo clippy -- -D warnings

      - name: Unit + Component
        run: |
          cargo test --bin afhttp
          bash tests/check_regressions.sh

      - name: End-to-end Stress
        run: |
          cargo build
          python3 tests/stress.py
          python3 tests/cli_stress.py
          python3 tests/ws_stress.py

      - name: Coverage Gate
        run: python3 tests/coverage_gate.py
