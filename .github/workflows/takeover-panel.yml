name: Display Takeover

# The display-takeover suite is flaky by design: it drives a real KasmVNC
# display under the Docker harness. It runs here on a nightly schedule (and on
# demand) in its own workflow so it never gates a merge or a release —
# `wait_for_ci_green` watches ci.yml only.

on:
  schedule:
    - cron: '17 4 * * *'   # nightly, 04:17 UTC
  workflow_dispatch:

# afhttp depends on a sibling crate at ../agent-first-data/rust via a Cargo path
# override; check out both repos in the layout the Docker harness expects.
jobs:
  display-takeover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: kit/spores/agent-first-http
          fetch-depth: 0
      - uses: actions/checkout@v4
        with:
          repository: agentfirstkit/agent-first-data
          path: kit/spores/agent-first-data
          fetch-depth: 1
      - name: Display-takeover suite (KasmVNC, Docker harness)
        working-directory: kit/spores/agent-first-http
        run: tests/test.sh takeover
