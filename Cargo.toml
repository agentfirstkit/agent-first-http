[package]
name = "agent-first-http"
version = "0.3.4"
edition = "2021"
description = "Persistent HTTP client for AI agents — one request, one JSON line"
license = "MIT"
repository = "https://github.com/cmnspore/agent-first-http"
readme = "README.md"

[[bin]]
name = "afhttp"
path = "src/main.rs"

[features]
default = ["mcp"]
mcp = ["dep:rmcp", "dep:schemars"]

[dependencies]
tokio = { version = "1", features = ["full"] }
reqwest = { version = "0.13", default-features = false, features = [
    "json", "rustls", "gzip", "brotli", "deflate",
    "multipart", "stream", "socks", "http2"
] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
base64 = "0.22"
uuid = { version = "1", features = ["v4"] }
tokio-util = { version = "0.7", features = ["io"] }
tokio-tungstenite = { version = "0.28", features = ["rustls-tls-native-roots"] }
futures = "0.3"
clap = { version = "4", features = ["derive"] }
agent-first-data = "0.7.0"
rmcp = { version = "1.1", features = ["macros", "server", "transport-io"], optional = true }
schemars = { version = "1", optional = true }
